name: Nightly data backup

# Pulls the live game state from Supabase and commits a versioned JSON snapshot,
# so there's always a recoverable history of tasks & scores in the repo.
# Activates once VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY secrets are set.

on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC daily (~midnight–3am US)
  workflow_dispatch: # manual "Run workflow" button

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch snapshot from Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Supabase secrets not set yet — skipping backup."
            exit 0
          fi
          mkdir -p data
          DATE=$(date -u +%Y-%m-%d)
          curl -sf \
            "$SUPABASE_URL/rest/v1/todo_war_game?id=eq.singleton&select=tasks,events,updated_at" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -o "data/latest.json"
          cp "data/latest.json" "data/snapshot-$DATE.json"
          echo "Wrote data/latest.json and data/snapshot-$DATE.json"

      - name: Commit snapshot
        run: |
          if [ ! -f data/latest.json ]; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name "todo-war-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No changes since last backup."
          else
            git commit -m "chore: data backup $(date -u +%Y-%m-%d)"
            git push
          fi
